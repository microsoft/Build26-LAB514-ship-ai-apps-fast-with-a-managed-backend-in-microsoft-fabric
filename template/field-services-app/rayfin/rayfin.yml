id: field-services-app
name: Field Services
version: 1.0.0
services:
  auth:
    enabled: true
    customClaims:
      app_version: 1.0.0
    scopes:
      - read:data
      - write:data
    password:
      enabled: true
    allowedRedirectUris:
      - http://localhost:5173
      - http://localhost:5173/auth/callback
    fabric:
      enabled: true
  data:
    enabled: true
    dialect: mssql
  storage:
    enabled: false
  staticHosting:
    enabled: true
    folder: dist
    buildCommand: npm run build:fabric
    indexDocument: index.html
